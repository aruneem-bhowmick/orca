[project]
name = "orca-shared"
version = "0.1.0"
description = "Shared infrastructure for the Orca ecosystem (registry, storage, tracking, schemas, clients)"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.4.0",
    "sqlalchemy>=2.0.0",
    "asyncpg>=0.29.0",
    "mlflow>=2.10.0",
    "minio>=7.2.0",
    "redis>=5.0.0",
    "httpx>=0.25.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.1.0",
    "mypy>=1.7.0",
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.1.0",
    "respx>=0.20.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["orca_shared"]
