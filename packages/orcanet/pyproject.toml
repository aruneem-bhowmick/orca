[project]
name = "orcanet"
version = "0.1.0"
description = "Cross-domain knowledge transfer agent for the Orca ecosystem"
requires-python = ">=3.11"
dependencies = [
    "orca-shared",
    "orcamind",
    "orcalab",
    "torch>=2.0.0",
    "torchvision>=0.15.0",
    "faiss-cpu>=1.7.4",
    "sentence-transformers>=2.2.0",
    "langchain>=0.1.0",
    "langchain-openai>=0.0.5",
    "langchain-anthropic>=0.1.0",
    "fastapi>=0.104.0",
    "uvicorn[standard]>=0.24.0",
    "pydantic>=2.4.0",
    "httpx>=0.25.0",
    "sqlalchemy>=2.0.0",
    "asyncpg>=0.29.0",
    "hydra-core>=1.3.0",
    "omegaconf>=2.3.0",
    "numpy>=1.24.0",
    "scipy>=1.10.0",
    "scikit-learn>=1.3.0",
    "pandas>=2.0.0",
    "typer>=0.9.0",
]

[project.optional-dependencies]
gnn = [
    "torch-geometric",
]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.1.0",
    "respx>=0.20.0",
    "ruff>=0.1.0",
    "mypy>=1.7.0",
]

[project.scripts]
orcanet = "orcanet.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["orcanet"]
