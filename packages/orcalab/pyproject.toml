[project]
name = "orcalab"
version = "0.1.0"
description = "Hyperparameter search and experiment orchestration for the Orca ecosystem"
requires-python = ">=3.11"
dependencies = [
    "orca-shared",
    "orcamind",
    "optuna>=3.3.0",
    "prefect>=2.14.0",
    "cma>=3.3.0",
    "torch>=2.0.0",
    "pytorch-lightning>=2.0.0",
    "mlflow>=2.10.0",
    "hydra-core>=1.3.0",
    "omegaconf>=2.3.0",
    "fastapi>=0.104.0",
    "uvicorn[standard]>=0.24.0",
    "websockets>=12.0",
    "httpx>=0.25.0",
    "streamlit>=1.28.0",
    "plotly>=5.17.0",
    "typer>=0.9.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.1.0",
    "respx>=0.20.0",
    "ruff>=0.1.0",
    "mypy>=1.7.0",
]

[project.scripts]
orcalab = "orcalab.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["orcalab"]
