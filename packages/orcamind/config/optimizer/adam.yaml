# @package _global_.optimizer
name: adam
type: Adam

# Core hyperparameters
lr: 0.001
betas: [0.9, 0.999]
eps: 1.0e-8
weight_decay: 1.0e-4
amsgrad: false

# Learning rate scheduler
scheduler:
  type: CosineAnnealingLR
  T_max: 1000               # Matches max_meta_epochs in model config
  eta_min: 1.0e-6

# Gradient clipping (applied before optimizer step)
grad_clip_norm: 1.0
