defaults:
  - model: maml
  - dataset: openml
  - optimizer: adam
  - _self_

paths:
  data_dir: ${oc.env:ORCA_DATA_DIR,./data}
  model_dir: ${oc.env:ORCA_MODEL_DIR,./models}
  log_dir: ${oc.env:ORCA_LOG_DIR,./logs}

mlflow:
  tracking_uri: ${oc.env:MLFLOW_TRACKING_URI,http://localhost:5000}
  experiment_name: orcamind

seed: 42
device: cuda
