[project]
name = "orcamind"
version = "0.1.0"
description = "Meta-learning engine for model selection, hyperparameter optimization, and warm-start transfer"
requires-python = ">=3.11"
dependencies = [
    "torch>=2.0.0",
    "torchvision>=0.15.0",
    "pytorch-lightning>=2.0.0",
    "learn2learn>=0.2.0",
    "higher>=0.2.1",
    "numpy>=1.24.0",
    "scipy>=1.10.0",
    "scikit-learn>=1.3.0",
    "pandas>=2.0.0",
    "xgboost>=2.0.0",
    "mlflow>=2.10.0",
    "hydra-core>=1.3.0",
    "omegaconf>=2.3.0",
    "faiss-cpu>=1.7.4",
    "fastapi>=0.104.0",
    "uvicorn[standard]>=0.24.0",
    "pydantic>=2.4.0",
    "httpx>=0.25.0",
    "sqlalchemy>=2.0.0",
    "asyncpg>=0.29.0",
    "alembic>=1.13.0",
    "redis>=5.0.0",
    "minio>=7.2.0",
    "streamlit>=1.28.0",
    "plotly>=5.17.0",
    "typer>=0.9.0",
    "orca-shared",
    "openml>=0.14.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.1.0",
    "mypy>=1.7.0",
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.1.0",
]

[project.scripts]
orcamind = "orcamind.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["orcamind"]
