[tool.uv.workspace]
members = ["packages/orca-shared", "packages/orcamind", "packages/orcalab", "packages/orcanet", "packages/orca-web"]

[tool.uv.sources]
orca-shared = { workspace = true }
orcamind = { workspace = true }
orcalab = { workspace = true }
orcanet = { workspace = true }
orca-web = { workspace = true }

[tool.ruff]
line-length = 100
target-version = "py311"
select = ["E", "F", "I", "N", "W", "UP"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"

[[tool.mypy.overrides]]
module = "orca_shared.*"
strict = true

[tool.pytest.ini_options]
testpaths = ["packages/orca-shared/tests", "packages/orcamind/tests", "packages/orcalab/tests", "packages/orcanet/tests", "scripts/tests"]
asyncio_mode = "auto"
addopts = "--cov=packages --cov=scripts --cov-report=term-missing"
markers = [
    "clean_torch_modules: clear torch from sys.modules before the test runs",
]
