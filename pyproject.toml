[tool.uv.workspace]
members = ["packages/orca-shared", "packages/orcamind", "packages/orcalab", "packages/orcanet"]

[tool.ruff]
line-length = 100
target-version = "py311"
select = ["E", "F", "I", "N", "W", "UP"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"

[[tool.mypy.overrides]]
module = "orca_shared.*"
strict = true

[tool.pytest.ini_options]
testpaths = ["packages/orca-shared/tests", "packages/orcamind/tests", "packages/orcalab/tests", "packages/orcanet/tests"]
asyncio_mode = "auto"
addopts = "--cov=packages --cov-report=term-missing"
markers = [
    "clean_torch_modules: clear torch from sys.modules before the test runs",
]
